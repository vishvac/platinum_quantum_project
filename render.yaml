services:
  - type: web
    name: platinum-quantum-dashboard
    runtime: python
    buildCommand: |
      pip install --upgrade pip
      pip install -r dashboard/requirements.txt
    startCommand: streamlit run dashboard/app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.18
